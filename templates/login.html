<!DOCTYPE html>

<html>
<head>
<script>
    if (window.performance && window.performance.navigation.type === 2) {
        window.location.reload();
    }
</script>
<title>InsecuriTea | Login</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #f3efe9, #e6dfd6);
    margin: 0;
}

/* Centering */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    width: 360px;
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    text-align: center;
}

/* Title */
h2 {
    margin-bottom: 5px;
    color: #2d2d2d;
}

/* Tagline */
.tagline {
    font-size: 14px;
    color: #777;
    margin-bottom: 10px;
}

/* Mode Indicator */
.mode {
    font-weight: bold;
    margin-bottom: 15px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
    transition: all 0.2s ease;
}

/* Focus */
input:focus {
    outline: none;
    border-color: #6f4e37;
    box-shadow: 0 0 6px rgba(111, 78, 55, 0.3);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #6f4e37;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s ease;
}

button:hover {
    background: #5a3e2b;
}

/* Links */
a {
    display: inline-block;
    margin-top: 12px;
    color: #6f4e37;
    text-decoration: none;
    font-size: 14px;
}

a:hover {
    text-decoration: underline;
}

/* Switch Button */
.switch-btn {
    display: block;
    margin-top: 10px;
    padding: 10px;
    background: #333;
    color: white;
    border-radius: 8px;
    text-decoration: none;
}

.switch-btn:hover {
    background: #111;
}
</style>

</head>

<body>

<div class="container">
    <div class="card">

        <h2>☕ InsecuriTea</h2>
        <p class="tagline">Learn security by breaking it.</p>

        <!-- 🔐 MODE INDICATOR -->
        {% if mode == "insecure" %}
            <div class="mode" style="color:red;">INSECURE MODE</div>
        {% else %}
            <div class="mode" style="color:green;">SECURE MODE</div>
        {% endif %}

        <!-- LOGIN FORM -->
        <form action="/login" method="get">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <!-- 🔄 SWITCH MODE BUTTON -->
        <a href="/toggle" class="switch-btn">Switch Mode</a>

        <!-- REGISTER -->
        <a href="/register">Create an account</a>

    </div>
</div>

</body>
</html>
